---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-cyberia-mmo-client-production-blue
  namespace: default
  labels:
    app: dd-cyberia-mmo-client-production-blue
    deploy-id: dd-cyberia-mmo-client-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-cyberia-mmo-client-production-blue
  template:
    metadata:
      labels:
        app: dd-cyberia-mmo-client-production-blue
        deploy-id: dd-cyberia-mmo-client-production
    spec:
      containers:
        - name: dd-cyberia-mmo-client-production-blue
          image: underpost/cyberia-client:v3.2.5
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: underpost-config

          command:
            - /bin/sh
            - -c
            - >
              underpost config set container-status dd-cyberia-mmo-client-production-build-deployment &&
              cd /home/dd/engine/cyberia-client && git pull &&
              make -j$(nproc) -f /home/dd/engine/cyberia-client/Web.mk all BUILD_MODE=RELEASE &&
              underpost config set container-status dd-cyberia-mmo-client-production-initializing-deployment &&
              python3 /home/dd/engine/cyberia-client/server.py 8081 /home/dd/engine/cyberia-client/bin/web/release production 'underpost config set container-status dd-cyberia-mmo-client-production-running-deployment'


---
apiVersion: v1
kind: Service
metadata:
  name: dd-cyberia-mmo-client-production-blue-service
  namespace: default
spec:
  selector:
    app: dd-cyberia-mmo-client-production-blue
  ports:
    - name: 'tcp-8081'
      protocol: TCP
      port: 8081
      targetPort: 8081
    - name: 'udp-8081'
      protocol: UDP
      port: 8081
      targetPort: 8081
  type: LoadBalancer