---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-cyberia-mmo-client-development-blue
  namespace: default
  labels:
    app: dd-cyberia-mmo-client-development-blue
    deploy-id: dd-cyberia-mmo-client-development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-cyberia-mmo-client-development-blue
  template:
    metadata:
      labels:
        app: dd-cyberia-mmo-client-development-blue
        deploy-id: dd-cyberia-mmo-client-development
    spec:
      containers:
        - name: dd-cyberia-mmo-client-development-blue
          image: underpost/cyberia-client:v3.2.5
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: underpost-config

          command:
            - /bin/sh
            - -c
            - >
              underpost config set container-status dd-cyberia-mmo-client-development-build-deployment &&
              cd /home/dd/engine/cyberia-client && git pull &&
              make -j$(nproc) -f /home/dd/engine/cyberia-client/Web.mk all BUILD_MODE=DEBUG &&
              underpost config set container-status dd-cyberia-mmo-client-development-initializing-deployment &&
              python3 /home/dd/engine/cyberia-client/server.py 8082 /home/dd/engine/cyberia-client/bin/web/debug development 'underpost config set container-status dd-cyberia-mmo-client-development-running-deployment'


---
apiVersion: v1
kind: Service
metadata:
  name: dd-cyberia-mmo-client-development-blue-service
  namespace: default
spec:
  selector:
    app: dd-cyberia-mmo-client-development-blue
  ports:
    - name: 'tcp-8082'
      protocol: TCP
      port: 8082
      targetPort: 8082
    - name: 'udp-8082'
      protocol: UDP
      port: 8082
      targetPort: 8082
  type: LoadBalancer