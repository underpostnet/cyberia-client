
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: client.cyberiaonline.com
  namespace: default
spec:
  virtualhost:
    fqdn: client.cyberiaonline.com
    tls:
      secretName: client.cyberiaonline.com
  routes:
    - conditions:
        - prefix: /
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-mmo-client-production-blue-service
          port: 8081
          weight: 100
    